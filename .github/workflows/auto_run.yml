name: 🚀 공고 자동 수집 로봇 (하루 4회 정기 순찰)

on:
  schedule:
    # 한국 시간 기준: 09시, 12시, 15시, 18시 (하루 총 4회 가동)
    # UTC 기준: 00시, 03시, 06시, 09시
    - cron: '0 0,3,6,9 * * *'
  workflow_dispatch:

jobs:
  run-auto-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.10'

      - name: 3. 필수 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 공고 자동 수집 및 알림 실행
        run: |
          python main.py

      - name: 5. 최신 엑셀 및 알림 장부 깃허브에 저장
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add 통합_맞춤공고.xlsx 알림내역_기록장부.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [자동업데이트] 신규 맞춤공고 수집 완료" && git push)
